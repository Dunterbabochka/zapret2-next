name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate
        shell: pwsh
        run: ./utils/validate.ps1
      - name: Build archive
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          ./utils/build-release.ps1 -Version $version
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/zapret2-next-${{ github.ref_name }}.zip
            dist/release-sha256.txt
